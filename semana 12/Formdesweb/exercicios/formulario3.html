<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dados Pessoais</title>
    <link rel="stylesheet" href="../estilos/formulario3.css">
</head>
<body>

<form>
    <fieldset class="principal">
        <legend>Dados Pessoais</legend>

        <div class="linha">
            <fieldset class="box">
                <legend>Dados de Endereço</legend>

                <label>Cidade:</label>
                <input type="text" name="cidade">

                <label>CEP:</label>
                <input type="text" name="cep">
            </fieldset>

            <fieldset class="box">
                <legend>Dados de Telefone</legend>

                <label>Residencial:</label>
                <input type="text" name="residencial">

                <label>Celular:</label>
                <input type="text" name="celular">
            </fieldset>
        </div>

    </fieldset>
</form>

</body>
</html>
